# Production-like orchestration for the Klynt Education Platform.
# Build and run the full stack with one command:
#   docker compose up --build
#
# For a real deployment you will typically put this behind a reverse proxy
# (Traefik, Caddy, Nginx) that terminates TLS on ports 443/80.

name: klynt

services:
  postgres:
    image: postgres:16-alpine
    container_name: klynt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-klynt}
      POSTGRES_USER: ${POSTGRES_USER:-klynt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-klynt}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-klynt} -d ${POSTGRES_DB:-klynt}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: klynt-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: klynt-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${KLYNT_BACKEND_PORT:-3001}:3001"
    environment:
      - RUST_LOG=info
      # Note: the backend config loader uses "__" as the nested-key separator.
      - KLYNT_API__HOST=${KLYNT_API__HOST:-0.0.0.0}
      - KLYNT_API__PORT=${KLYNT_API__PORT:-3001}
      - KLYNT_DATABASE_URL=${KLYNT_DATABASE_URL:-postgresql://klynt:klynt@postgres:5432/klynt}
      - KLYNT_REDIS_URL=${KLYNT_REDIS_URL:-redis://redis:6379}
      # `api.allowed_origins` is a list in config/default.toml. Override it there
      # or by setting KLYNT_API__ALLOWED_ORIGINS='["http://localhost:5174"]'.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/api/v1/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001/api/v1}
        VITE_APP_NAME: ${VITE_APP_NAME:-Klynt}
    container_name: klynt-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${KLYNT_FRONTEND_PORT:-5174}:8080"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
