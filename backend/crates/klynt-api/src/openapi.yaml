openapi: 3.1.0
info:
  title: Klynt Education Platform API
  version: 1.0.0
  description: Multi-tenant education platform API

servers:
  - url: http://localhost:3001/api/v1
    description: Local development

paths:
  /auth/register:
    post:
      summary: Register a new user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Invalid input
        '409':
          description: Email already registered

  /auth/verify-email:
    post:
      summary: Verify email address
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailResponse'
        '400':
          description: Invalid or expired token

  /auth/request-password-reset:
    post:
      summary: Request password reset
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestPasswordResetRequest'
      responses:
        '200':
          description: Password reset email sent (if email exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestPasswordResetResponse'

  /auth/reset-password:
    post:
      summary: Reset password
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetPasswordResponse'
        '400':
          description: Invalid or expired token

  /sessions:
    post:
      summary: Create session (login)
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials

components:
  schemas:
    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
        - terms_accepted
        - terms_version
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
        terms_accepted:
          type: boolean
        terms_version:
          type: string

    RegisterResponse:
      type: object
      required:
        - user_id
        - message
      properties:
        user_id:
          type: string
          format: uuid
        message:
          type: string

    VerifyEmailRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          minLength: 50

    VerifyEmailResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    RequestPasswordResetRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    RequestPasswordResetResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    ResetPasswordRequest:
      type: object
      required:
        - token
        - new_password
      properties:
        token:
          type: string
          minLength: 50
        new_password:
          type: string
          minLength: 12

    ResetPasswordResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
          format: uuid
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      required:
        - id
        - name
        - email
        - role
        - status
        - email_verified_at
        - global_role
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [student, teacher, admin, parent]
        status:
          type: string
          enum: [pending_verification, active, suspended]
        email_verified_at:
          type: [string, "null"]
          format: date-time
        global_role:
          type: [string, "null"]
          enum: [owner, admin, user, null]
        created_at:
          type: string
          format: date-time

tags:
  - name: Authentication
    description: User authentication and authorization
