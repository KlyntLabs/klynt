openapi: 3.1.0
info:
  title: Klynt Education Platform API
  version: 1.0.0
  description: Gateway API for the Klynt education platform.

servers:
  - url: http://localhost:3000/api/v1
    description: Local development gateway

paths:
  /health:
    get:
      summary: Health check
      tags:
        - Health
      responses:
        '200':
          description: Gateway is alive

  /health/live:
    get:
      summary: Liveness probe
      tags:
        - Health
      responses:
        '200':
          description: Gateway process is alive

  /health/ready:
    get:
      summary: Readiness probe
      tags:
        - Health
      responses:
        '200':
          description: All dependencies are healthy
        '503':
          description: One or more dependencies are unhealthy

  /auth/register:
    post:
      summary: Register a new user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
        '400':
          description: Invalid input
        '409':
          description: Email or username already registered
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/verify-email:
    post:
      summary: Verify email address
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified successfully
        '400':
          description: Invalid or expired token

  /auth/request-password-reset:
    post:
      summary: Request password reset
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestPasswordResetRequest'
      responses:
        '200':
          description: Password reset email sent (if email exists)

  /auth/reset-password:
    post:
      summary: Reset password
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully
        '400':
          description: Invalid or expired token

  /auth/login:
    post:
      summary: Create session (login)
      description: |
        Authenticate a user and create a session. On success, the response
        contains the session token in the JSON body and also sets an
        `HttpOnly` `session_token` cookie scoped to the configured SSO domain.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              description: |
                HttpOnly `session_token` cookie for cross-subdomain SSO.
                Clients may also read `access_token` from the response body.
              schema:
                type: string
        '401':
          description: Invalid credentials
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/logout:
    post:
      summary: End session (logout)
      description: |
        Invalidate the current session. The token is read from the JSON body
        when provided; otherwise the `session_token` cookie is used. On success
        the `session_token` cookie is cleared.
      tags:
        - Authentication
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logged out successfully
          headers:
            Set-Cookie:
              description: Clears the `session_token` cookie.
              schema:
                type: string
        '400':
          description: Missing session token

components:
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - username
        - password
      properties:
        email:
          type: string
          format: email
        username:
          type: string
          minLength: 1
          maxLength: 50
        password:
          type: string
          minLength: 8
        full_name:
          type: [string, "null"]
        role:
          type: string
          enum: [student, instructor, admin]
          default: student
        institution_id:
          type: [string, "null"]
          format: uuid

    VerifyEmailRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string

    RequestPasswordResetRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required:
        - token
        - new_password
      properties:
        token:
          type: string
        new_password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        remember_me:
          type: [boolean, "null"]

    LoginResponse:
      type: object
      required:
        - access_token
        - refresh_token
        - expires_at
        - user
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/UserSessionInfo'

    UserSessionInfo:
      type: object
      required:
        - id
        - email
        - role
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: [string, "null"]
        role:
          type: string
          enum: [student, instructor, admin]

    LogoutRequest:
      type: object
      properties:
        session_token:
          type: string
          description: |
            Optional session token. If omitted, the `session_token` cookie is
            used instead.

    RateLimitError:
      type: object
      required:
        - success
        - error
        - code
        - retry_after
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string
        code:
          type: string
          enum: [RATE_LIMITED]
        retry_after:
          type: integer
          minimum: 0

  responses:
    TooManyRequests:
      description: Rate limit exceeded
      headers:
        Retry-After:
          description: Number of seconds to wait before retrying
          schema:
            type: integer
            minimum: 0
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitError'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Session token provided in the `Authorization` header.
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_token
      description: |
        Session token provided as an `HttpOnly` cookie for cross-subdomain SSO.

tags:
  - name: Health
    description: Operational health checks
  - name: Authentication
    description: User authentication and authorization
