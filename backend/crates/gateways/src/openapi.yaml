openapi: 3.1.0
info:
  title: Klynt Education Platform API
  version: 1.0.0
  description: Gateway API for the Klynt education platform.

servers:
  - url: http://localhost:3000/api/v1
    description: Local development gateway

paths:
  /health:
    get:
      summary: Health check
      tags:
        - Health
      responses:
        '200':
          description: Gateway is alive

  /health/live:
    get:
      summary: Liveness probe
      tags:
        - Health
      responses:
        '200':
          description: Gateway process is alive

  /health/ready:
    get:
      summary: Readiness probe
      tags:
        - Health
      responses:
        '200':
          description: All dependencies are healthy
        '503':
          description: One or more dependencies are unhealthy

  /auth/register:
    post:
      summary: Register a new user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
        '400':
          description: Invalid input
        '409':
          description: Email or username already registered
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/verify-email:
    post:
      summary: Verify email address
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified successfully
        '400':
          description: Invalid or expired token

  /auth/request-password-reset:
    post:
      summary: Request password reset
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestPasswordResetRequest'
      responses:
        '200':
          description: Password reset email sent (if email exists)

  /auth/reset-password:
    post:
      summary: Reset password
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully
        '400':
          description: Invalid or expired token

  /auth/login:
    post:
      summary: Create session (login)
      description: |
        Authenticate a user and create a session. On success, the response
        contains the session token in the JSON body and also sets an
        `HttpOnly` `session_token` cookie scoped to the configured SSO domain.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              description: |
                HttpOnly `session_token` cookie for cross-subdomain SSO.
                Clients may also read `access_token` from the response body.
              schema:
                type: string
        '401':
          description: Invalid credentials
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/logout:
    post:
      summary: End session (logout)
      description: |
        Invalidate the current session. The token is read from the JSON body
        when provided; otherwise the `session_token` cookie is used. On success
        the `session_token` cookie is cleared.
      tags:
        - Authentication
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logged out successfully
          headers:
            Set-Cookie:
              description: Clears the `session_token` cookie.
              schema:
                type: string
        '400':
          description: Missing session token

  /tenants/{slug}/desktop/apps:
    post:
      summary: Create a desktop app
      description: |
        Create a new desktop mini-app in the tenant. The authenticated user
        becomes the owner.
      tags:
        - Desktop
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppPayload'
      responses:
        '201':
          description: App created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: Not a tenant member

  /tenants/{slug}/desktop:
    get:
      summary: Get the desktop bundle
      description: |
        Return the caller's desktop bundle for the tenant, including all
        visible apps.
      tags:
        - Desktop
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Desktop bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DesktopBundleResponse'
        '401':
          description: Unauthorized
        '403':
          description: Not a tenant member

  /tenants/{slug}/apps/{appId}:
    get:
      summary: Get a desktop app
      tags:
        - Desktop
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: appId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: App details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse'
        '401':
          description: Unauthorized
        '403':
          description: Not app owner or tenant member
        '404':
          description: App not found
    patch:
      summary: Update a desktop app
      tags:
        - Desktop
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: appId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAppPayload'
      responses:
        '200':
          description: App updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse'
        '400':
          description: Invalid input or etag mismatch
        '401':
          description: Unauthorized
        '403':
          description: Not app owner or app is locked
        '404':
          description: App not found
    delete:
      summary: Delete a desktop app
      tags:
        - Desktop
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: appId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: App deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Not app owner or app is locked
        '404':
          description: App not found

components:
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - username
        - password
      properties:
        email:
          type: string
          format: email
        username:
          type: string
          minLength: 1
          maxLength: 50
        password:
          type: string
          minLength: 8
        full_name:
          type: [string, "null"]
        role:
          type: string
          enum: [student, instructor, admin]
          default: student
        institution_id:
          type: [string, "null"]
          format: uuid

    VerifyEmailRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string

    RequestPasswordResetRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required:
        - token
        - new_password
      properties:
        token:
          type: string
        new_password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        remember_me:
          type: [boolean, "null"]

    LoginResponse:
      type: object
      required:
        - access_token
        - refresh_token
        - expires_at
        - user
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/UserSessionInfo'

    UserSessionInfo:
      type: object
      required:
        - id
        - email
        - role
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: [string, "null"]
        role:
          type: string
          enum: [student, instructor, admin]

    LogoutRequest:
      type: object
      properties:
        session_token:
          type: string
          description: |
            Optional session token. If omitted, the `session_token` cookie is
            used instead.

    CreateAppPayload:
      type: object
      required:
        - type
        - title
      properties:
        type:
          type: string
          enum: [markdown, notes, video, folder]
        title:
          type: string
          minLength: 1
        content:
          type: object
        menu_config:
          type: object

    UpdateAppPayload:
      type: object
      required:
        - etag
      properties:
        etag:
          type: string
        title:
          type: string
          minLength: 1
        content:
          type: object
        menu_config:
          type: object

    AppResponse:
      type: object
      required:
        - id
        - type
        - title
        - content
        - menu_config
        - locked
        - etag
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [markdown, notes, video, folder]
        title:
          type: string
        content:
          type: object
        menu_config:
          type: object
        owner_id:
          type: [string, "null"]
          format: uuid
        locked:
          type: boolean
        etag:
          type: string

    AppSummary:
      type: object
      required:
        - id
        - type
        - title
        - owner_id
        - locked
        - etag
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [markdown, notes, video, folder]
        title:
          type: string
        owner_id:
          type: [string, "null"]
          format: uuid
        locked:
          type: boolean
        etag:
          type: string

    DesktopBundleResponse:
      type: object
      required:
        - apps
        - etag
      properties:
        apps:
          type: array
          items:
            $ref: '#/components/schemas/AppSummary'
        etag:
          type: string

    RateLimitError:
      type: object
      required:
        - success
        - error
        - code
        - retry_after
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string
        code:
          type: string
          enum: [RATE_LIMITED]
        retry_after:
          type: integer
          minimum: 0

  responses:
    TooManyRequests:
      description: Rate limit exceeded
      headers:
        Retry-After:
          description: Number of seconds to wait before retrying
          schema:
            type: integer
            minimum: 0
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitError'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Session token provided in the `Authorization` header.
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_token
      description: |
        Session token provided as an `HttpOnly` cookie for cross-subdomain SSO.

tags:
  - name: Health
    description: Operational health checks
  - name: Authentication
    description: User authentication and authorization
  - name: Desktop
    description: Tenant desktop mini-apps and layout
