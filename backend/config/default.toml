# Default configuration for Klynt backend

[api]
host = "127.0.0.1"
port = 3000
allowed_origins = ["http://localhost:5174", "http://lvh.me:5174", "http://*.lvh.me:5174"]

[rate_limiter]
enabled = false
max_requests = 100
window_seconds = 60

[session]
session_duration_secs = 86400
long_session_duration_secs = 2592000
refresh_duration_secs = 2592000

log_level = "debug"
hsts_enabled = false
cookie_domain = ""
# WARNING: cookie_secure must be true in production with TLS termination.
# Leaving it false sends session cookies over plaintext HTTP.
cookie_secure = false

# Email delivery backend. Use "mock" for tests/initial dev and "smtp" with the
# bundled Mailpit service for real email verification flow testing.
[email]
provider = "mock"

[email.smtp]
host = "localhost"
port = 1025
from = "noreply@klynt.local"
# username = ""
# password = ""
tls = false
