[workspace]
resolver = "2"
members = [
    "crates/klynt-domain",
    "crates/klynt-application",
    "crates/klynt-infrastructure",
    "crates/klynt-api",
    "crates/klynt-server",
]

[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Web framework
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "compression-gzip", "timeout"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Time
chrono = { version = "0.4", features = ["serde"] }

# IDs
uuid = { version = "1", features = ["v4", "serde"] }

# Error handling
thiserror = "1"
anyhow = "1"

# Tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Configuration
config = "0.15"
dotenvy = "0.15"

# Password hashing
argon2 = "0.5"
rand_core = { version = "0.6", features = ["getrandom"] }

# Internal crates
klynt-domain = { path = "crates/klynt-domain" }
klynt-application = { path = "crates/klynt-application" }
klynt-infrastructure = { path = "crates/klynt-infrastructure" }
klynt-api = { path = "crates/klynt-api" }

[workspace.lints.rust]
unsafe_code = "forbid"
