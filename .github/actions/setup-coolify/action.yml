name: "Setup Coolify CLI"
description: "Installs the Coolify CLI and authenticates against Coolify Cloud."

inputs:
  version:
    description: "Coolify CLI version to install"
    required: false
    default: "1.6.2"
  fqdn:
    description: "Coolify instance FQDN"
    required: true
  token:
    description: "Coolify API token"
    required: true
  context-name:
    description: "Name for the Coolify CLI context"
    required: false
    default: "cloud"

runs:
  using: "composite"
  steps:
    - name: Cache Coolify CLI
      id: cache-coolify
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
      with:
        path: ~/.local/bin/coolify
        key: coolify-cli-${{ runner.os }}-${{ inputs.version }}

    - name: Install Coolify CLI
      if: steps.cache-coolify.outputs.cache-hit != 'true'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        mkdir -p "$HOME/.local/bin"
        curl -fsSL "https://github.com/coollabsio/coolify-cli/releases/download/v${VERSION}/coolify-cli_${VERSION}_linux_amd64.tar.gz" -o /tmp/coolify.tar.gz
        tar -xzf /tmp/coolify.tar.gz -C /tmp
        mv /tmp/coolify "$HOME/.local/bin/coolify"
        chmod +x "$HOME/.local/bin/coolify"
        rm -f /tmp/coolify.tar.gz

    - name: Add Coolify CLI to PATH
      shell: bash
      run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Authenticate Coolify CLI
      shell: bash
      env:
        FQDN: ${{ inputs.fqdn }}
        CONTEXT_NAME: ${{ inputs.context-name }}
        TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        mkdir -p "$HOME/.config/coolify"
        cat > "$HOME/.config/coolify/config.json" <<EOF
        {
          "instances": [
            {
              "default": true,
              "fqdn": "${FQDN}",
              "name": "${CONTEXT_NAME}",
              "token": "${TOKEN}"
            }
          ]
        }
        EOF
        coolify context verify
