version: 2
updates:
  - package-ecosystem: cargo
    directory: /backend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5

  - package-ecosystem: bun
    directory: /frontend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "@astryxdesign/*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
