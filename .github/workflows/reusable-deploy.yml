name: Reusable Deploy to Coolify

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub environment name (dev, staging, production)"
        required: true
        type: string
      checkout_ref:
        description: "Git ref to check out (defaults to the calling workflow ref)"
        required: false
        type: string
        default: ""
      notify:
        description: "Whether to send deployment notifications"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Resolve environment config
        id: env_config
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          DEV_BACKEND_UUID: ${{ vars.DEV_BACKEND_APP_UUID }}
          DEV_FRONTEND_UUID: ${{ vars.DEV_FRONTEND_APP_UUID }}
          DEV_BACKEND_HEALTH_URL: ${{ vars.DEV_BACKEND_HEALTH_URL }}
          DEV_FRONTEND_URL: ${{ vars.DEV_FRONTEND_URL }}
          STAGING_BACKEND_UUID: ${{ vars.STAGING_BACKEND_APP_UUID }}
          STAGING_FRONTEND_UUID: ${{ vars.STAGING_FRONTEND_APP_UUID }}
          STAGING_BACKEND_HEALTH_URL: ${{ vars.STAGING_BACKEND_HEALTH_URL }}
          STAGING_FRONTEND_URL: ${{ vars.STAGING_FRONTEND_URL }}
          PRODUCTION_BACKEND_UUID: ${{ vars.PRODUCTION_BACKEND_APP_UUID }}
          PRODUCTION_FRONTEND_UUID: ${{ vars.PRODUCTION_FRONTEND_APP_UUID }}
          PRODUCTION_BACKEND_HEALTH_URL: ${{ vars.PRODUCTION_BACKEND_HEALTH_URL }}
          PRODUCTION_FRONTEND_URL: ${{ vars.PRODUCTION_FRONTEND_URL }}
        run: |
          set -euo pipefail
          case "$ENVIRONMENT" in
            dev)
              backend_health_url="$DEV_BACKEND_HEALTH_URL"
              frontend_url="$DEV_FRONTEND_URL"
              echo "backend_uuid=$DEV_BACKEND_UUID" >> "$GITHUB_OUTPUT"
              echo "frontend_uuid=$DEV_FRONTEND_UUID" >> "$GITHUB_OUTPUT"
              echo "backend_health_url=${backend_health_url}" >> "$GITHUB_OUTPUT"
              echo "backend_url=${backend_health_url%/health/ready}" >> "$GITHUB_OUTPUT"
              echo "frontend_url=${frontend_url}" >> "$GITHUB_OUTPUT"
              frontend_host="${frontend_url#*://}"
              echo "frontend_wildcard_origin=https://*.${frontend_host}" >> "$GITHUB_OUTPUT"
              ;;
            staging)
              backend_health_url="$STAGING_BACKEND_HEALTH_URL"
              frontend_url="$STAGING_FRONTEND_URL"
              echo "backend_uuid=$STAGING_BACKEND_UUID" >> "$GITHUB_OUTPUT"
              echo "frontend_uuid=$STAGING_FRONTEND_UUID" >> "$GITHUB_OUTPUT"
              echo "backend_health_url=${backend_health_url}" >> "$GITHUB_OUTPUT"
              echo "backend_url=${backend_health_url%/health/ready}" >> "$GITHUB_OUTPUT"
              echo "frontend_url=${frontend_url}" >> "$GITHUB_OUTPUT"
              frontend_host="${frontend_url#*://}"
              echo "frontend_wildcard_origin=https://*.${frontend_host}" >> "$GITHUB_OUTPUT"
              ;;
            production)
              backend_health_url="$PRODUCTION_BACKEND_HEALTH_URL"
              frontend_url="$PRODUCTION_FRONTEND_URL"
              echo "backend_uuid=$PRODUCTION_BACKEND_UUID" >> "$GITHUB_OUTPUT"
              echo "frontend_uuid=$PRODUCTION_FRONTEND_UUID" >> "$GITHUB_OUTPUT"
              echo "backend_health_url=${backend_health_url}" >> "$GITHUB_OUTPUT"
              echo "backend_url=${backend_health_url%/health/ready}" >> "$GITHUB_OUTPUT"
              echo "frontend_url=${frontend_url}" >> "$GITHUB_OUTPUT"
              frontend_host="${frontend_url#*://}"
              echo "frontend_wildcard_origin=https://*.${frontend_host}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Setup Coolify CLI
        uses: ./.github/actions/setup-coolify
        with:
          fqdn: ${{ vars.COOLIFY_FQDN || 'https://app.coolify.io' }}
          token: ${{ secrets.COOLIFY_TOKEN }}

      - name: Create GitHub Deployment
        id: create_deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENVIRONMENT: ${{ inputs.environment }}
          REF: ${{ inputs.checkout_ref || github.ref }}
        run: |
          set -euo pipefail
          deployment_id=$(gh api "repos/${{ github.repository }}/deployments" \
            --method POST \
            -f ref="$REF" \
            -f environment="$ENVIRONMENT" \
            -f auto_merge=false \
            -f required_contexts[]= \
            --jq '.id')
          echo "deployment_id=$deployment_id" >> "$GITHUB_OUTPUT"
          gh api "repos/${{ github.repository }}/deployments/${deployment_id}/statuses" \
            --method POST \
            -f state='pending' \
            >/dev/null

      - name: Capture previous deployments
        id: previous_deployments
        env:
          BACKEND_UUID: ${{ steps.env_config.outputs.backend_uuid }}
          FRONTEND_UUID: ${{ steps.env_config.outputs.frontend_uuid }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/get-current-deployment.sh
          backend_prev=$(.github/scripts/get-current-deployment.sh "$BACKEND_UUID")
          frontend_prev=$(.github/scripts/get-current-deployment.sh "$FRONTEND_UUID")
          echo "backend_deployment=${backend_prev}" >> "$GITHUB_OUTPUT"
          echo "frontend_deployment=${frontend_prev}" >> "$GITHUB_OUTPUT"
          echo "Previous backend deployment: ${backend_prev:-<none>}"
          echo "Previous frontend deployment: ${frontend_prev:-<none>}"

      - name: Sync backend environment variables
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          KLYNT_DATABASE_URL: ${{ secrets.KLYNT_DATABASE_URL }}
          KLYNT_REDIS_URL: ${{ secrets.KLYNT_REDIS_URL }}
          KLYNT_API__HOST: ${{ vars.KLYNT_API__HOST || '0.0.0.0' }}
          KLYNT_API__PORT: ${{ vars.KLYNT_API__PORT || '3001' }}
          KLYNT_API__ALLOWED_ORIGINS_0: ${{ steps.env_config.outputs.frontend_url }}
          KLYNT_API__ALLOWED_ORIGINS_1: ${{ steps.env_config.outputs.frontend_wildcard_origin }}
          KLYNT_API__TRUSTED_PROXIES: ${{ vars.KLYNT_API__TRUSTED_PROXIES || '' }}
          KLYNT_COOKIE_DOMAIN: ${{ secrets.KLYNT_COOKIE_DOMAIN }}
          KLYNT_COOKIE_SECURE: ${{ secrets.KLYNT_COOKIE_SECURE }}
          KLYNT_COOKIE_SAMESITE: ${{ secrets.KLYNT_COOKIE_SAMESITE || 'Lax' }}
          KLYNT_HSTS_ENABLED: ${{ secrets.KLYNT_HSTS_ENABLED }}
          KLYNT_CSP_REPORT_ONLY: ${{ secrets.KLYNT_CSP_REPORT_ONLY }}
          KLYNT_CSP_DIRECTIVE: ${{ secrets.KLYNT_CSP_DIRECTIVE }}
          KLYNT_BASE_URL: ${{ steps.env_config.outputs.backend_url }}
          KLYNT_LOG_BODIES: ${{ secrets.KLYNT_LOG_BODIES || 'false' }}
          KLYNT_LOG_SUCCESS: ${{ secrets.KLYNT_LOG_SUCCESS || 'false' }}
          KLYNT_MAX_BODY_SIZE: ${{ secrets.KLYNT_MAX_BODY_SIZE || '10240' }}
          KLYNT_RATE_LIMITER__ENABLED: ${{ secrets.KLYNT_RATE_LIMITER__ENABLED }}
          KLYNT_RATE_LIMITER__MAX_REQUESTS: ${{ secrets.KLYNT_RATE_LIMITER__MAX_REQUESTS }}
          KLYNT_RATE_LIMITER__WINDOW_SECONDS: ${{ secrets.KLYNT_RATE_LIMITER__WINDOW_SECONDS }}
          KLYNT_SESSION__SESSION_DURATION_SECS: ${{ secrets.KLYNT_SESSION__SESSION_DURATION_SECS }}
          KLYNT_SESSION__LONG_SESSION_DURATION_SECS: ${{ secrets.KLYNT_SESSION__LONG_SESSION_DURATION_SECS }}
          KLYNT_SESSION__REFRESH_DURATION_SECS: ${{ secrets.KLYNT_SESSION__REFRESH_DURATION_SECS }}
          KLYNT_SESSION_SYNC_ENABLED: ${{ secrets.KLYNT_SESSION_SYNC_ENABLED || 'true' }}
          RUST_LOG: ${{ secrets.RUST_LOG || 'info' }}
          SQLX_OFFLINE: "true"
          BACKEND_UUID: ${{ steps.env_config.outputs.backend_uuid }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/sync-env-vars.sh
          .github/scripts/sync-env-vars.sh "$BACKEND_UUID" backend

      - name: Sync frontend environment variables
        env:
          VITE_API_BASE_URL: ${{ steps.env_config.outputs.backend_url }}/api/v1
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME || 'Klynt' }}
          VITE_APP_DOMAIN: ${{ secrets.VITE_APP_DOMAIN }}
          VITE_APP_PROTOCOL: ${{ secrets.VITE_APP_PROTOCOL || 'https' }}
          FRONTEND_UUID: ${{ steps.env_config.outputs.frontend_uuid }}
        run: |
          set -euo pipefail
          .github/scripts/sync-env-vars.sh "$FRONTEND_UUID" frontend

      - name: Deploy backend
        env:
          BACKEND_UUID: ${{ steps.env_config.outputs.backend_uuid }}
        run: |
          set -euo pipefail
          coolify app restart "$BACKEND_UUID"

      - name: Deploy frontend
        env:
          FRONTEND_UUID: ${{ steps.env_config.outputs.frontend_uuid }}
        run: |
          set -euo pipefail
          coolify app restart "$FRONTEND_UUID"

      - name: Wait for backend deployment
        env:
          BACKEND_UUID: ${{ steps.env_config.outputs.backend_uuid }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/wait-for-deployment.sh
          .github/scripts/wait-for-deployment.sh "$BACKEND_UUID" 900 10

      - name: Wait for frontend deployment
        env:
          FRONTEND_UUID: ${{ steps.env_config.outputs.frontend_uuid }}
        run: |
          set -euo pipefail
          .github/scripts/wait-for-deployment.sh "$FRONTEND_UUID" 900 10

      - name: Wait for backend health
        id: backend_health
        uses: ./.github/actions/health-check
        with:
          url: ${{ steps.env_config.outputs.backend_health_url }}
          expected_status: 200
          expected_json_path: '.healthy'
          expected_json_value: 'true'
          timeout_seconds: 120
          interval_seconds: 10

      - name: Wait for frontend availability
        id: frontend_health
        uses: ./.github/actions/health-check
        with:
          url: ${{ steps.env_config.outputs.frontend_url }}
          expected_status: 200
          timeout_seconds: 120
          interval_seconds: 10

      - name: Rollback to previous deployments
        id: rollback
        if: failure() && (steps.backend_health.outcome == 'failure' || steps.frontend_health.outcome == 'failure')
        env:
          BACKEND_UUID: ${{ steps.env_config.outputs.backend_uuid }}
          FRONTEND_UUID: ${{ steps.env_config.outputs.frontend_uuid }}
          PREV_BACKEND: ${{ steps.previous_deployments.outputs.backend_deployment }}
          PREV_FRONTEND: ${{ steps.previous_deployments.outputs.frontend_deployment }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/rollback-to-deployment.sh
          echo "Rolling back backend to ${PREV_BACKEND}"
          .github/scripts/rollback-to-deployment.sh "$BACKEND_UUID" "$PREV_BACKEND"
          echo "Rolling back frontend to ${PREV_FRONTEND}"
          .github/scripts/rollback-to-deployment.sh "$FRONTEND_UUID" "$PREV_FRONTEND"

      - name: Wait for rollback deployments
        if: steps.rollback.outcome == 'success'
        env:
          BACKEND_UUID: ${{ steps.env_config.outputs.backend_uuid }}
          FRONTEND_UUID: ${{ steps.env_config.outputs.frontend_uuid }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/wait-for-deployment.sh
          .github/scripts/wait-for-deployment.sh "$BACKEND_UUID" 900 10
          .github/scripts/wait-for-deployment.sh "$FRONTEND_UUID" 900 10

      - name: Verify backend rollback health
        if: steps.rollback.outcome == 'success'
        uses: ./.github/actions/health-check
        with:
          url: ${{ steps.env_config.outputs.backend_health_url }}
          expected_status: 200
          expected_json_path: '.healthy'
          expected_json_value: 'true'
          timeout_seconds: 120
          interval_seconds: 10

      - name: Verify frontend rollback health
        if: steps.rollback.outcome == 'success'
        uses: ./.github/actions/health-check
        with:
          url: ${{ steps.env_config.outputs.frontend_url }}
          expected_status: 200
          timeout_seconds: 120
          interval_seconds: 10

      - name: Update deployment status to success
        if: success() && steps.create_deployment.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOYMENT_ID: ${{ steps.create_deployment.outputs.deployment_id }}
          FRONTEND_URL: ${{ steps.env_config.outputs.frontend_url }}
        run: |
          set -euo pipefail
          gh api "repos/${{ github.repository }}/deployments/${DEPLOYMENT_ID}/statuses" \
            --method POST \
            -f state='success' \
            -f environment_url="$FRONTEND_URL" \
            -f log_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            >/dev/null

      - name: Notify success
        if: ${{ inputs.notify && success() }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ENVIRONMENT: ${{ inputs.environment }}
          SHA: ${{ github.sha }}
        run: |
          if [[ -n "${SLACK_WEBHOOK_URL:-}" ]]; then
            curl -s -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"✅ Deployed ${ENVIRONMENT} (${SHA})\"}" \
              "$SLACK_WEBHOOK_URL" || true
          fi

      - name: Update deployment status to failure
        if: failure() && steps.create_deployment.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOYMENT_ID: ${{ steps.create_deployment.outputs.deployment_id }}
          FRONTEND_URL: ${{ steps.env_config.outputs.frontend_url }}
        run: |
          set -euo pipefail
          gh api "repos/${{ github.repository }}/deployments/${DEPLOYMENT_ID}/statuses" \
            --method POST \
            -f state='failure' \
            -f environment_url="$FRONTEND_URL" \
            -f log_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            >/dev/null

      - name: Notify failure
        if: ${{ inputs.notify && failure() }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ENVIRONMENT: ${{ inputs.environment }}
          SHA: ${{ github.sha }}
          ROLLED_BACK: ${{ steps.rollback.outcome == 'success' && 'true' || 'false' }}
        run: |
          if [[ -n "${SLACK_WEBHOOK_URL:-}" ]]; then
            if [[ "$ROLLED_BACK" == "true" ]]; then
              message="❌ Deploy failed for ${ENVIRONMENT} (${SHA}) — rolled back to previous deployment"
            else
              message="❌ Deploy failed for ${ENVIRONMENT} (${SHA})"
            fi
            curl -s -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"${message}\"}" \
              "$SLACK_WEBHOOK_URL" || true
          fi
