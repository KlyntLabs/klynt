name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to roll back"
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
      target_sha:
        description: "Commit SHA to roll back to (leave empty for previous successful deployment)"
        required: false
        type: string

jobs:
  resolve-target:
    name: Resolve rollback target
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.resolve.outputs.target_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve target SHA
        id: resolve
        env:
          TARGET_SHA_INPUT: ${{ github.event.inputs.target_sha }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          set -euo pipefail
          if [[ -n "${TARGET_SHA_INPUT}" ]]; then
            target="${TARGET_SHA_INPUT}"
          else
            branch="${ENVIRONMENT}"
            target=$(git log --format='%H' -n 2 "origin/$branch" | tail -n 1)
          fi
          echo "target_sha=$target" >> "$GITHUB_OUTPUT"
          echo "Rolling back ${ENVIRONMENT} to $target"

  rollback-dev:
    name: Rollback dev
    needs: resolve-target
    if: ${{ github.event.inputs.environment == 'dev' }}
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: dev
      checkout_ref: ${{ needs.resolve-target.outputs.target_sha }}
    secrets: inherit

  rollback-staging:
    name: Rollback staging
    needs: resolve-target
    if: ${{ github.event.inputs.environment == 'staging' }}
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: staging
      checkout_ref: ${{ needs.resolve-target.outputs.target_sha }}
    secrets: inherit

  rollback-production:
    name: Rollback production
    needs: resolve-target
    if: ${{ github.event.inputs.environment == 'production' }}
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: production
      checkout_ref: ${{ needs.resolve-target.outputs.target_sha }}
    secrets: inherit
