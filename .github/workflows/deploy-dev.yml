name: Deploy Dev

on:
  push:
    branches: [dev]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy-dev.yml'
      - '.github/workflows/reusable-deploy.yml'
      - '.github/workflows/health-check.yml'
      - '.github/actions/setup-coolify/**'
      - '.github/scripts/generate-env.sh'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to dev
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: dev
      backend_app_uuid: ${{ vars.DEV_BACKEND_APP_UUID }}
      frontend_app_uuid: ${{ vars.DEV_FRONTEND_APP_UUID }}
      backend_health_url: ${{ vars.DEV_BACKEND_HEALTH_URL }}
      frontend_url: ${{ vars.DEV_FRONTEND_URL }}
    secrets: inherit
