name: Deploy Dev

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to dev
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.actor.login != 'dependabot[bot]' && github.event.workflow_run.head_branch == 'dev') }}
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: dev
      checkout_ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '' }}
    # Internal same-repo reusable workflow; explicit secret map would be unmaintainable.
    secrets: inherit # nosemgrep: yaml.github-actions.security.secrets-inherit.secrets-inherit
