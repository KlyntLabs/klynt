name: Deploy Dev

on:
  push:
    branches: [dev]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy-dev.yml'
      - '.github/workflows/reusable-deploy.yml'
      - '.github/workflows/health-check.yml'
      - '.github/actions/setup-coolify/**'
      - '.github/scripts/generate-env.sh'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to dev
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: dev
    secrets: inherit
