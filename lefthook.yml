# Docs: https://lefthook.dev/configuration/
# Installed automatically via `bun run prepare` in frontend/
#
# Policy:
# - pre-commit: fast staged-only checks (format/lint)
# - pre-push: full local CI gate (typecheck, tests, build) with change detection

pre-commit:
  parallel: true
  commands:
    rustfmt:
      glob: "**/*.rs"
      run: cd backend && cargo fmt --all -- --check
    backend-file-size:
      glob: "backend/crates/**/*.rs"
      run: backend/scripts/check-file-size.sh {staged_files}
    biome-check:
      glob: "**/*.{js,ts,tsx,json,jsonc,css}"
      run: cd frontend && bunx @biomejs/biome check --error-on-warnings --no-errors-on-unmatched $(for f in {staged_files}; do echo "${f#frontend/}"; done)
    frontend-file-size:
      glob: "frontend/src/**/*.{ts,tsx,js,jsx,css}"
      run: frontend/scripts/check-file-size.sh {staged_files}
    gitleaks:
      run: |
        if ! command -v gitleaks >/dev/null 2>&1; then
          echo "⏭️  gitleaks not installed; install with 'brew install gitleaks' or skip locally (CI still runs it)"
          exit 0
        fi
        gitleaks protect --staged --verbose --source .

pre-push:
  commands:
    frontend-typecheck:
      glob: "**/*.{js,ts,tsx}"
      run: |
        PUSH_TARGET=$(git rev-parse @{push} 2>/dev/null || echo "")
        if [ -n "$PUSH_TARGET" ] && ! git diff --name-only "$PUSH_TARGET"..HEAD | grep -qE '^frontend/'; then
          echo "⏭️  frontend-typecheck skipped (no frontend changes)"
          exit 0
        fi
        cd frontend && bun run typecheck
    frontend-test:
      glob: "**/*.{js,ts,tsx}"
      run: |
        PUSH_TARGET=$(git rev-parse @{push} 2>/dev/null || echo "")
        if [ -n "$PUSH_TARGET" ] && ! git diff --name-only "$PUSH_TARGET"..HEAD | grep -qE '^frontend/'; then
          echo "⏭️  frontend-test skipped (no frontend changes)"
          exit 0
        fi
        cd frontend && bun run test:coverage
    frontend-build:
      glob: "**/*.{js,ts,tsx}"
      run: |
        PUSH_TARGET=$(git rev-parse @{push} 2>/dev/null || echo "")
        if [ -n "$PUSH_TARGET" ] && ! git diff --name-only "$PUSH_TARGET"..HEAD | grep -qE '^frontend/'; then
          echo "⏭️  frontend-build skipped (no frontend changes)"
          exit 0
        fi
        cd frontend && bun run build
    frontend-performance-budget:
      glob: "**/*.{js,ts,tsx,webp,png,jpg,jpeg,avif,gif}"
      run: |
        PUSH_TARGET=$(git rev-parse @{push} 2>/dev/null || echo "")
        if [ -n "$PUSH_TARGET" ] && ! git diff --name-only "$PUSH_TARGET"..HEAD | grep -qE '^frontend/'; then
          echo "⏭️  frontend-performance-budget skipped (no frontend changes)"
          exit 0
        fi
        cd frontend && ./scripts/check-performance-budget.sh
    backend-format:
      glob: "**/*.rs"
      run: |
        PUSH_TARGET=$(git rev-parse @{push} 2>/dev/null || echo "")
        if [ -n "$PUSH_TARGET" ] && ! git diff --name-only "$PUSH_TARGET"..HEAD | grep -qE '^backend/'; then
          echo "⏭️  backend-format skipped (no backend changes)"
          exit 0
        fi
        cd backend && cargo fmt --all -- --check
    backend-clippy:
      glob: "**/*.rs"
      run: |
        PUSH_TARGET=$(git rev-parse @{push} 2>/dev/null || echo "")
        if [ -n "$PUSH_TARGET" ] && ! git diff --name-only "$PUSH_TARGET"..HEAD | grep -qE '^backend/'; then
          echo "⏭️  backend-clippy skipped (no backend changes)"
          exit 0
        fi
        cd backend && cargo clippy --all-targets --all-features -- -D warnings
    backend-test:
      glob: "**/*.rs"
      run: |
        PUSH_TARGET=$(git rev-parse @{push} 2>/dev/null || echo "")
        if [ -n "$PUSH_TARGET" ] && ! git diff --name-only "$PUSH_TARGET"..HEAD | grep -qE '^backend/'; then
          echo "⏭️  backend-test skipped (no backend changes)"
          exit 0
        fi
        cd backend && DATABASE_URL=${DATABASE_URL:-postgresql://klynt:klynt@localhost:5432/test} REDIS_URL=${REDIS_URL:-redis://localhost:6379/0} cargo llvm-cov nextest --workspace --all-features --no-clean --fail-under-lines 84 -- --include-ignored
    backend-audit:
      glob: "**/*.rs"
      run: |
        PUSH_TARGET=$(git rev-parse @{push} 2>/dev/null || echo "")
        if [ -n "$PUSH_TARGET" ] && ! git diff --name-only "$PUSH_TARGET"..HEAD | grep -qE '^backend/'; then
          echo "⏭️  backend-audit skipped (no backend changes)"
          exit 0
        fi
        if ! cargo audit --version >/dev/null 2>&1; then
          echo "⏭️  cargo-audit not installed; install with 'cargo install cargo-audit --locked' or run 'just setup'"
          exit 0
        fi
        cd backend && cargo audit
    backend-machete:
      glob: "**/*.rs"
      run: |
        PUSH_TARGET=$(git rev-parse @{push} 2>/dev/null || echo "")
        if [ -n "$PUSH_TARGET" ] && ! git diff --name-only "$PUSH_TARGET"..HEAD | grep -qE '^backend/'; then
          echo "⏭️  backend-machete skipped (no backend changes)"
          exit 0
        fi
        if ! cargo machete --version >/dev/null 2>&1; then
          echo "⏭️  cargo-machete not installed; install with 'cargo install cargo-machete --locked' or run 'just setup'"
          exit 0
        fi
        cd backend && cargo machete
